name: "Bug Report"
description: "Something is broken. Use for type:bug issues raised during QA or production."
title: "[Bug] "
labels: ["type:bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **Tester or Dev raises this.** Set priority (`P0`–`P3`) and assign the appropriate `role:dev` label.
        Link this bug to the feature issue it was found in. A bug remains open until Dev fixes it and Tester re-verifies.

  - type: dropdown
    id: severity
    attributes:
      label: Severity / Priority
      options:
        - "P0 — Blocker (system unusable / data loss / security violation)"
        - "P1 — High (core feature broken)"
        - "P2 — Medium (degraded experience, workaround exists)"
        - "P3 — Low (cosmetic / minor)"
    validations:
      required: true

  - type: input
    id: linked_feature
    attributes:
      label: Linked Feature Issue
      placeholder: "#XX"

  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - "epic:foundation"
        - "epic:wizard"
        - "epic:extraction"
        - "epic:agent"
        - "epic:results-ui"
        - "epic:china"
        - "epic:security-nfr"
        - "epic:monetization"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: arch_principle_violated
    attributes:
      label: Architectural Principle Violated (if applicable)
      description: If this bug is a violation of a P1–P9 architectural principle, select it.
      options:
        - "N/A — functional bug"
        - "P1 — Credentials left the client"
        - "P2 — Client performing analysis / Backend collecting data"
        - "P3 — LLM generated a number directly (not from tool)"
        - "P4 — MarketContext mutated or assumed"
        - "P5 — Component crashed on partial data (no graceful degradation)"
        - "P6 — Platform-specific logic leaked into core"
        - "P7 — Pipeline module modified Scout internals"
        - "P8 — Hardcoded market / platform / fee value in logic"
        - "P9 — Security control missing or bypassed"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Windows 11, macOS 14"

  - type: input
    id: app_version
    attributes:
      label: App Version
      placeholder: "e.g. v0.3.1"

  - type: input
    id: market
    attributes:
      label: Market Selected
      placeholder: "e.g. us, cn, sea"

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Screenshots, logs, extracted JSON payload, or network traces (redact any credentials).
