name: Notify Human on Label

# Fires whenever an issue or PR is labeled with `needs-human-signoff`.
# AI agents should add this label whenever they reach a decision point
# requiring human input before work can continue.
#
# This workflow sends an immediate notification via all configured channels.

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  notify:
    name: Notify Human Owner
    if: github.event.label.name == 'needs-human-signoff'
    runs-on: ubuntu-latest
    steps:
      - name: Determine context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "type=Issue" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.issue.html_url }}" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            echo "type=Pull Request" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      # ── GitHub automatically @mentions + emails the assignee ──────────────
      # No extra config needed — GitHub's own notification system handles this
      # as long as you are listed as the assignee or @mentioned in the issue.

      # ── Slack notification ─────────────────────────────────────────────────
      - name: Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🙋 *OneSell: Your Decision Required*",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🙋 OneSell — Your Decision Required" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Type*\n${{ steps.ctx.outputs.type }} #${{ steps.ctx.outputs.number }}" },
                    { "type": "mrkdwn", "text": "*Labeled by*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*${{ steps.ctx.outputs.title }}*" }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "👉 Go to GitHub" },
                      "url": "${{ steps.ctx.outputs.url }}",
                      "style": "primary"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "Reply on GitHub with your decision. The AI team is paused and waiting." }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # ── Email notification ─────────────────────────────────────────────────
      - name: Email notification
        if: ${{ secrets.SMTP_SERVER != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[OneSell] 🙋 Your Decision Required — ${{ steps.ctx.outputs.type }} #${{ steps.ctx.outputs.number }}: ${{ steps.ctx.outputs.title }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: ${{ secrets.NOTIFY_EMAIL_FROM }}
          html_body: |
            <h2>🙋 OneSell Scout — Your Decision Required</h2>
            <p>The AI team has paused and is waiting for your input before continuing.</p>
            <table style="border-collapse:collapse;width:100%">
              <tr style="background:#f6f8fa">
                <td style="padding:8px;border:1px solid #d0d7de"><b>Type</b></td>
                <td style="padding:8px;border:1px solid #d0d7de">${{ steps.ctx.outputs.type }} #${{ steps.ctx.outputs.number }}</td>
              </tr>
              <tr>
                <td style="padding:8px;border:1px solid #d0d7de"><b>Title</b></td>
                <td style="padding:8px;border:1px solid #d0d7de"><a href="${{ steps.ctx.outputs.url }}">${{ steps.ctx.outputs.title }}</a></td>
              </tr>
              <tr style="background:#f6f8fa">
                <td style="padding:8px;border:1px solid #d0d7de"><b>Labeled by</b></td>
                <td style="padding:8px;border:1px solid #d0d7de">${{ github.actor }}</td>
              </tr>
            </table>
            <h3>Description / Question</h3>
            <pre style="background:#f6f8fa;padding:12px;border-radius:4px;white-space:pre-wrap">${{ steps.ctx.outputs.body }}</pre>
            <hr>
            <h3>How to respond</h3>
            <ol>
              <li>Click the button below to open the issue or PR on GitHub</li>
              <li>Read the context and the question or request</li>
              <li>Post a comment with your decision or approval</li>
              <li>The AI team will resume automatically based on your response</li>
            </ol>
            <p>
              <a href="${{ steps.ctx.outputs.url }}" style="background:#2da44e;color:white;padding:12px 24px;text-decoration:none;border-radius:4px;font-weight:bold;display:inline-block;">👉 Open on GitHub & Respond</a>
            </p>
            <p style="color:#656d76;font-size:12px">
              You are receiving this because you are the project owner of OneSell Scout.
              Reply on GitHub — not to this email.
            </p>
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}

      # ── Auto-assign the owner so GitHub also sends its own notification ────
      - name: Auto-assign owner
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            if (context.eventName === 'issues') {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [owner]
              });
            }
        continue-on-error: true
